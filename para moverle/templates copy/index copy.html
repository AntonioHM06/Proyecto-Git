<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Unidades</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
    <h1>CONVERSOR DE UNIDADES</h1>
    <p class="subtitulo">Hecha por Geiboys team</p>

    <form method="post">
        <select name="tipo" id="tipo" onchange="cambiarUnidades()">
            <option value="temperatura">Temperatura</option>
            <option value="distancia">Distancia</option>
            <option value="peso">Peso</option>
        </select>

        <input type="number" name="valor" placeholder="Ingrese el valor" step="any" required>

        <select name="origen" id="origen"></select>

        <span>a</span>

        <select name="destino" id="destino"></select>

        <button type="submit">Convertir</button>
    </form>

    {% if resultado is not none %}
        <h2>Resultado: {{ resultado }}</h2>
    {% endif %}

    {% if error %}
        <p style="color: #b00020; font-weight: 600;">{{ error }}</p>
    {% endif %}

    <script>
        function cambiarUnidades() {
            const tipo = document.getElementById("tipo").value;
            const origen = document.getElementById("origen");
            const destino = document.getElementById("destino");

            origen.innerHTML = "";
            destino.innerHTML = "";

            let unidades = [];

            if (tipo === "temperatura") {
                unidades = [
                    { value: "C", text: "Celsius" },
                    { value: "K", text: "Kelvin" },
                    { value: "F", text: "Fahrenheit" }
                ];
            } else if (tipo === "distancia") {
                unidades = [
                    { value: "milimetros", text: "Milimetros" },
                    { value: "centimetros", text: "Centimetros" },
                    { value: "pulgadas", text: "Pulgadas" },
                    { value: "pies", text: "Pies" },
                    { value: "metros", text: "Metros" },
                    { value: "kilometros", text: "Kilometros" },
                    { value: "millas", text: "Millas" }
                ];
            } else if (tipo === "peso") {
                unidades = [
                    { value: "onzas", text: "Onzas" },
                    { value: "gramos", text: "Gramos" },
                    { value: "kilogramos", text: "Kilogramos" }
                ];
            }

            unidades.forEach(function(unidad) {
                const option1 = new Option(unidad.text, unidad.value);
                const option2 = new Option(unidad.text, unidad.value);
                origen.add(option1);
                destino.add(option2);
            });
        }

        window.onload = cambiarUnidades;
    </script>
</body>
</html>
