<!DOCTYPE html>
<html lang="es"><!--  idioma de la pagina  -->
<link rel="stylesheet" href="index.css"><!--  esporta la personalizacion del archivo "index.css"  -->


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITULO</title><!--Texto de la pestaña-->
</head>


<body>
    <h1>titulo de Cabecera</h1><!-- Titulo  -->
    <p>texto</p><!-- texto -->
    <img class="imagen_1"src=""><!--pone una imagen--> -->
<!-- El comando "src=" indica de donde va a salir la imagen(url o local) -->

     
    <ul><!-- Lista conpuntos -->
        <li></li><!-- elementos de la lista (uno)-->
    </ul>
    

    <ol><!-- Este es un comentario en HTML -->
        <li></li>
    </ol>
    
    <input type="number" placeholder=""><!-- Solicita entrada de datos(numero, texto, archivos, etc.) -->
<!-- El comando "type=" indica que tipo de dato queremos que sea ingresado -->
<!-- El comando "placeholder" la indicacion del dato(solicitud) -->


    <div class="joel"><!-- contenedor para organizar, puede separarse en secciones-->

    </div>


</body>
