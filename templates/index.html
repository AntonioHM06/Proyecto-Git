<!DOCTYPE html>
<html lang="es"><!--  idioma de la pagina  -->
<link rel="stylesheet" href="index.css"><!--  esporta la personalizacion del archivo "index.css"  -->


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Unidades</title><!--Texto de la pestaña-->
</head>


<body>
    <h1>CONVERSOR DE UNIDADES</h1><!-- Titulo  -->
    <p class="subtitulo">Hecha por Geiboys team </p><!-- texto -->
<!-- El comando "src=" indica de donde va a salir la imagen(url o local) -->

<select name ="tipo" id="tipo" onchange="cambiarunidades()">
    <option value ="temperatura">Temperatura</option>
    <option value ="distancia">Distancia</option>
    <option value ="peso">Peso</option>
</select> 
     <form method="post">
        <input type="number" name="valor" placeholder="Ingrese el valor" required>

        <select name="origen" id="origen">
            <option value="C">Celsius</option>
            <option value="K">Kelvin</option>
            <option value="F">Fahrenheit</option>
        </select>
        
        a

        <select name="destino" id="destino">
            <option value="C">Celsius</option>
            <option value="K">Kelvin</option>
            <option value="F">Fahrenheit</option>
        </select>
        <button type="submit">Convertir</button>
     </form>
     <script>
    function cambiarunidades() {
        // Corregido: getElementById (la "I" es mayúscula)
        var tipo = document.getElementById("tipo").value;
        var origen = document.getElementById("origen");
        var destino = document.getElementById("destino");

        // Limpiar las opciones actuales
        origen.innerHTML = "";
        destino.innerHTML = "";

        var unidades = [];
        if (tipo === "temperatura") {
            unidades = ["C", "K", "F"];
        } else if (tipo === "distancia") {
            unidades = ["m", "km", "mi"];
        } else if (tipo === "peso") {
            unidades = ["g", "kg", "lb"];
        }

        unidades.forEach(function(unidad) {
            // Corregido: new Option (la "O" es mayúscula)
            // El primer parámetro es el texto visible, el segundo es el "value"
            let option1 = new Option(unidad, unidad);
            let option2 = new Option(unidad, unidad);

            origen.add(option1);
            destino.add(option2);
        });
    }

    // Ejecutar al cargar la página para que inicie con las unidades correctas
    window.onload = cambiarunidades;
     </script>

     {% if resultado is not none %}
        <h2>Resultado: {{ resultado }}</h2>
        {% endif %}

</body>
</html>
